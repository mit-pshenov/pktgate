# /etc/pktgate/pktgate.conf — environment overrides for pktgate.service
#
# To use: uncomment lines below and run `systemctl daemon-reload && systemctl restart pktgate`
#
# Extra CLI flags (e.g. --debug for verbose logging)
# PKTGATE_EXTRA_ARGS=--debug
#
# Override config file path
# PKTGATE_CONFIG=/etc/pktgate/config.json
#
# Prometheus metrics endpoint (port 0 = disabled)
# PKTGATE_METRICS_PORT=9090
