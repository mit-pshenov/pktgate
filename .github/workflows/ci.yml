name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-anti-pattern:
    # Static guard against the "test cements a bug as contract" anti-pattern.
    # See _review/TEST_AUDIT.md §"Phase 2i" / §"Phase 2c P1" and the script
    # itself for the rule. No build needed — pure grep over tests/ trees.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Check for test-as-contract anti-pattern
        run: bash scripts/check_test_as_contract.sh

  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Debug
            sanitizer: ""
          - build_type: Debug
            sanitizer: asan
          - build_type: Debug
            sanitizer: ubsan
          - build_type: Release
            sanitizer: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 llvm-18 libbpf-dev \
            libelf-dev zlib1g-dev nlohmann-json3-dev lcov
          # Install bpftool: linux-tools-generic wrapper fails on Azure
          # runners, so we grab the real binary and put it on PATH directly.
          sudo apt-get install -y --no-install-recommends linux-tools-generic
          # The wrapper at /usr/sbin/bpftool fails on Azure kernels.
          # Find the real binary and put it ahead of the wrapper in PATH.
          REAL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          if [ -n "$REAL" ]; then
            sudo cp "$REAL" /usr/local/bin/bpftool
            sudo chmod +x /usr/local/bin/bpftool
          else
            echo "::error::bpftool not found under /usr/lib/linux-tools"
            exit 1
          fi
          /usr/local/bin/bpftool version

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ${{ matrix.sanitizer && format('-DSANITIZER={0}', matrix.sanitizer) || '' }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        run: ctest --test-dir build -L unit --output-on-failure

      - name: Integration tests
        run: ctest --test-dir build -L integration --output-on-failure

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 llvm-18 libbpf-dev linux-tools-generic \
            libelf-dev zlib1g-dev nlohmann-json3-dev lcov
          REAL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          if [ -n "$REAL" ]; then
            sudo cp "$REAL" /usr/local/bin/bpftool
            sudo chmod +x /usr/local/bin/bpftool
          fi
          /usr/local/bin/bpftool version

      - name: Build with coverage
        run: |
          cmake -B build -DCOVERAGE=ON
          cmake --build build -j$(nproc)

      - name: Run tests
        # Includes bpf_dataplane (privileged); sudo required.
        run: sudo ctest --test-dir build --output-on-failure

      - name: Restore ownership of coverage artifacts
        # sudo'd tests write .gcda files as root; lcov needs the user to own them.
        run: sudo chown -R "$(id -u):$(id -g)" build/

      - name: Generate coverage report
        run: make -C build coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: build/coverage_html/

  bpf-dataplane:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 llvm-18 libbpf-dev linux-tools-generic \
            libelf-dev zlib1g-dev nlohmann-json3-dev
          REAL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          if [ -n "$REAL" ]; then
            sudo cp "$REAL" /usr/local/bin/bpftool
            sudo chmod +x /usr/local/bin/bpftool
          else
            echo "::error::bpftool not found under /usr/lib/linux-tools"
            exit 1
          fi
          /usr/local/bin/bpftool version

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run BPF data-plane tests
        # Label "bpf" is set on bpf_dataplane in CMakeLists.txt; sudo needed for BPF_PROG_TEST_RUN.
        run: sudo ctest --test-dir build -L bpf --output-on-failure

  functional:
    runs-on: ubuntu-24.04
    # All P0/P1 functional-cluster bugs are closed. Previous IPv6 ordering
    # flake (#13) was a tcpdump filter scoping bug, not a data-plane issue:
    # broad filters like `ip6` matched kernel-emitted egress (IPv6 NS/RS/MLD,
    # DAD) from ns_filter, intermittently failing drop-asserts. Capture
    # helpers now pin direction to ingress (`tcpdump -Q in`), which gates
    # out everything the kernel sends and leaves only what XDP let through.
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 llvm-18 libbpf-dev linux-tools-generic \
            libelf-dev zlib1g-dev nlohmann-json3-dev \
            python3-pytest python3-scapy iproute2
          REAL=$(find /usr/lib/linux-tools -name bpftool 2>/dev/null | head -1)
          if [ -n "$REAL" ]; then
            sudo cp "$REAL" /usr/local/bin/bpftool
            sudo chmod +x /usr/local/bin/bpftool
          else
            echo "::error::bpftool not found under /usr/lib/linux-tools"
            exit 1
          fi
          /usr/local/bin/bpftool version

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run functional tests
        # Veth + netns + XDP attach require root.
        run: sudo bash functional_tests/run.sh
